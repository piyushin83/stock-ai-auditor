# ─────────────────────────────────────────────────────────────────
#  FILE LOCATION:  .streamlit/secrets.toml
#  This file is read by Streamlit automatically as st.secrets["KEY"]
#  NEVER commit this file — it is already in .gitignore
#
#  On Streamlit Cloud: paste these values into
#  App → Settings → Secrets  (no file needed there)
# ─────────────────────────────────────────────────────────────────

[auth]
password = "your_strong_password_here"
# Add more users as needed:
# users = ["alice", "bob"]

[app]
secret_key = "replace_with_random_64_char_hex_string"
